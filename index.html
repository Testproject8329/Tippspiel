<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WM 2026 Tippspiel Mobile Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        /* Unschöne native Browser-Pfeile bei Nummernfeldern komplett entfernen */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        /* Input-Optimierung für iOS & Android (verhindert automatisches Zoomen) */
        input[type="number"], input[type="text"], select {
            font-size: 16px !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 font-sans min-h-screen transition-colors duration-200 pb-12">

    <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 py-4 px-4 sticky top-0 z-50 shadow-md transition-colors duration-200">
        <div class="max-w-2xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="text-center sm:text-left">
                <h1 class="text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 to-amber-600 dark:from-yellow-400 dark:to-amber-500">
                    🏆 WM 2026 Tippspiel
                </h1>
            </div>
            
            <div class="flex items-center gap-2 w-full sm:w-auto justify-center sm:justify-end">
                <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all text-lg cursor-pointer">
                    <span class="dark:hidden">🌙</span>
                    <span class="hidden dark:inline">☀️</span>
                </button>
                <button onclick="shareState()" class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-amber-500 text-slate-950 font-bold hover:bg-amber-400 transition-all shadow-sm text-sm cursor-pointer">
                    <span>🔗</span> Link teilen
                </button>
            </div>
        </div>
    </header>

    <div class="sticky top-[69px] z-40 bg-slate-50/90 dark:bg-slate-900/90 backdrop-blur-md py-3 px-4 border-b border-slate-200 dark:border-slate-800/60">
        <div id="player-view-toggle" class="max-w-md mx-auto flex bg-slate-200 dark:bg-slate-950 p-1 rounded-xl border border-slate-300 dark:border-slate-800">
            </div>
    </div>

    <div class="hidden">
        <span id="lead-name-0"></span><span id="lead-score-0"></span>
        <span id="lead-name-1"></span><span id="lead-score-1"></span>
    </div>

    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 translate-y-20 opacity-0 bg-emerald-600 text-white px-6 py-3 rounded-xl shadow-2xl transition-all duration-300 z-50 font-semibold flex items-center gap-2 whitespace-nowrap">
        <span>✓</span> <span id="toast-text">Link kopiert!</span>
    </div>

    <main class="max-w-2xl mx-auto p-4">
        <div id="player-container-0" class="bg-white dark:bg-slate-800/40 rounded-2xl p-4 border border-slate-200 dark:border-slate-800 shadow-lg transition-colors duration-200"></div>
        <div id="player-container-1" class="bg-white dark:bg-slate-800/40 rounded-2xl p-4 border border-slate-200 dark:border-slate-800 shadow-lg transition-colors duration-200 hidden"></div>
    </main>

    <script>
        const teamFlags = {
            "South Africa": "🇿🇦", "Canada": "🇨🇦", "Netherlands": "🇳🇱", "Morocco": "🇲🇦",
            "Germany": "🇩🇪", "Paraguay": "🇵🇾", "France": "🇫🇷", "Sweden": "🇸🇪",
            "Belgium": "🇧🇪", "Senegal": "🇸🇳", "USA": "🇺🇸", "Bosnia and Herzegovina": "🇧🇦",
            "Spain": "🇪🇸", "Austria": "🇦🇹", "Portugal": "🇵🇹", "Croatia": "🇭🇷",
            "Brazil": "🇧🇷", "Japan": "🇯🇵", "Côte d'Ivoire": "🇨🇮", "Norway": "🇳🇴",
            "Mexico": "🇲🇽", "Ecuador": "🇪🇨", "England": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "DR Congo": "🇨🇩",
            "Switzerland": "🇨🇭", "Algeria": "🇩🇿", "Colombia": "🇨🇴", "Ghana": "🇬🇭",
            "Australia": "🇦🇺", "Egypt": "🇪🇬", "Argentina": "🇦🇷", "Cabo Verde": "🇨🇻"
        };

        const roundNames = {
            'R32': 'R32', 'R16': 'AF', 'QF': 'VF', 'SF': 'HF', '3RD': 'Pl. 3', 'FINAL': 'Finale'
        };

        const initialMatchesData = [
            { id: 1, round: 'R32', date: 'Heute, 21:00', t1: 'South Africa', t2: 'Canada' },
            { id: 2, round: 'R32', date: 'Di, 30. Jun, 03:00', t1: 'Netherlands', t2: 'Morocco' },
            { id: 3, round: 'R32', date: 'Morgen, 22:30', t1: 'Germany', t2: 'Paraguay' },
            { id: 4, round: 'R32', date: 'Di, 30. Jun, 23:00', t1: 'France', t2: 'Sweden' },
            { id: 5, round: 'R32', date: 'Mi, 1. Jul, 22:00', t1: 'Belgium', t2: 'Senegal' },
            { id: 6, round: 'R32', date: 'Do, 2. Jul, 02:00', t1: 'USA', t2: 'Bosnia and Herzegovina' },
            { id: 7, round: 'R32', date: 'Do, 2. Jul, 21:00', t1: 'Spain', t2: 'Austria' },
            { id: 8, round: 'R32', date: 'Fr, 3. Jul, 01:00', t1: 'Portugal', t2: 'Croatia' },
            { id: 9, round: 'R32', date: 'Morgen, 19:00', t1: 'Brazil', t2: 'Japan' },
            { id: 10, round: 'R32', date: 'Di, 30. Jun, 19:00', t1: "Côte d'Ivoire", t2: 'Norway' },
            { id: 11, round: 'R32', date: 'Mi, 1. Jul, 03:00', t1: 'Mexico', t2: 'Ecuador' },
            { id: 12, round: 'R32', date: 'Mi, 1. Jul, 18:00', t1: 'England', t2: 'DR Congo' },
            { id: 13, round: 'R32', date: 'Fr, 3. Jul, 05:00', t1: 'Switzerland', t2: 'Algeria' },
            { id: 14, round: 'R32', date: 'Sa, 4. Jul, 03:30', t1: 'Colombia', t2: 'Ghana' },
            { id: 15, round: 'R32', date: 'Fr, 3. Jul, 20:00', t1: 'Australia', t2: 'Egypt' },
            { id: 16, round: 'R32', date: 'Sa, 4. Jul, 00:00', t1: 'Argentina', t2: 'Cabo Verde' },
            
            ...Array.from({length: 16}, (_, i) => ({ id: 17 + i, round: i < 8 ? 'R16' : i < 12 ? 'QF' : i < 14 ? 'SF' : i === 14 ? '3RD' : 'FINAL', date: 'TBD', t1: '', t2: '' }))
        ];

        initialMatchesData[16].date="Sa, 4. Jul"; initialMatchesData[17].date="Sa, 4. Jul";
        initialMatchesData[18].date="Di, 7. Jul"; initialMatchesData[19].date="Mo, 6. Jul";
        initialMatchesData[20].date="So, 5. Jul"; initialMatchesData[21].date="Mo, 6. Jul";
        initialMatchesData[22].date="Di, 7. Jul"; initialMatchesData[23].date="Di, 7. Jul";
        initialMatchesData[24].date="Fr, 10. Jul"; initialMatchesData[25].date="Fr, 10. Jul";
        initialMatchesData[26].date="Sa, 11. Jul"; initialMatchesData[27].date="Sa, 11. Jul";
        initialMatchesData[28].date="Di, 14. Jul"; initialMatchesData[29].date="Mi, 15. Jul";
        initialMatchesData[30].date="Sa, 18. Jul"; initialMatchesData[31].date="So, 19. Jul";

        let state = [
            { name: "Tipper 1", activeFilter: "R32", matches: JSON.parse(JSON.stringify(initialMatchesData)) },
            { name: "Tipper 2", activeFilter: "R32", matches: JSON.parse(JSON.stringify(initialMatchesData)) }
        ];

        let activePlayerView = 0;

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.classList.toggle('dark', savedTheme === 'dark');
        }

        window.toggleTheme = function() {
            const isDark = document.documentElement.classList.contains('dark');
            document.documentElement.classList.toggle('dark', !isDark);
            localStorage.setItem('theme', !isDark ? 'dark' : 'light');
        }

        function saveToLocalStorage() {
            localStorage.setItem('wm2026_tipp_state_v3', JSON.stringify(state));
        }

        function loadInitialState() {
            initTheme();
            const urlParams = new URLSearchParams(window.location.search);
            const importData = urlParams.get('share');
            
            if (importData) {
                try {
                    const decoded = JSON.parse(decodeURIComponent(escape(atob(importData))));
                    decoded.forEach((pData, pIdx) => {
                        state[pIdx].name = pData.n;
                        pData.m.forEach(mData => {
                            const match = state[pIdx].matches.find(m => m.id === mData.id);
                            if (match) {
                                match.tipHome = mData.th; match.tipAway = mData.ta;
                                match.realHome = mData.rh; match.realAway = mData.ra;
                                match.mode = mData.mo; match.manualWinner = mData.mw;
                                match.penaltyWinner = mData.pw;
                            }
                        });
                    });
                    saveToLocalStorage();
                    showToast("Tipps importiert!");
                    window.history.replaceState({}, document.title, window.location.pathname);
                    return;
                } catch(e) { console.error(e); }
            }

            const local = localStorage.getItem('wm2026_tipp_state_v3');
            if (local) { try { state = JSON.parse(local); } catch(e) { console.error(e); } }
        }

        window.shareState = function() {
            const minState = state.map(p => ({
                n: p.name,
                m: p.matches.map(m => ({
                    id: m.id, th: m.tipHome||'', ta: m.tipAway||'', rh: m.realHome||'', ra: m.realAway||'',
                    mo: m.mode||'auto', mw: m.manualWinner||'', pw: m.penaltyWinner||''
                }))
            }));
            const base64 = btoa(unescape(encodeURIComponent(JSON.stringify(minState))));
            const shareUrl = window.location.origin + window.location.pathname + '?share=' + base64;
            
            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast("Link in Zwischenablage!");
            }).catch(() => { alert("URL:\n" + shareUrl); });
        }

        function showToast(text) {
            const el = document.getElementById("toast");
            document.getElementById("toast-text").innerText = text;
            el.classList.remove("translate-y-20", "opacity-0");
            setTimeout(() => el.classList.add("translate-y-20", "opacity-0"), 2500);
        }

        window.setActivePlayerView = function(pIdx) {
            activePlayerView = pIdx;
            document.getElementById("player-container-0").classList.toggle("hidden", activePlayerView !== 0);
            document.getElementById("player-container-1").classList.toggle("hidden", activePlayerView !== 1);
            renderApp();
        }

        function getNextMatchTarget(matchId) {
            if (matchId >= 1 && matchId <= 16) return { nextId: 16 + Math.ceil(matchId / 2), slot: matchId % 2 === 1 ? 't1' : 't2' };
            if (matchId >= 17 && matchId <= 24) { const rel = matchId - 16; return { nextId: 24 + Math.ceil(rel / 2), slot: rel % 2 === 1 ? 't1' : 't2' }; }
            if (matchId >= 25 && matchId <= 28) { const rel = matchId - 24; return { nextId: 28 + Math.ceil(rel / 2), slot: rel % 2 === 1 ? 't1' : 't2' }; }
            if (matchId === 29) return { winnerTarget: { nextId: 32, slot: 't1' }, loserTarget: { nextId: 31, slot: 't1' } };
            if (matchId === 30) return { winnerTarget: { nextId: 32, slot: 't2' }, loserTarget: { nextId: 31, slot: 't2' } };
            return null;
        }

        function calculateMatchPoints(m) {
            if (m.tipHome === undefined || m.tipAway === undefined || m.realHome === undefined || m.realAway === undefined ||
                m.tipHome === '' || m.tipAway === '' || m.realHome === '' || m.realAway === '') return 0;
            const th = parseInt(m.tipHome), ta = parseInt(m.tipAway), rh = parseInt(m.realHome), ra = parseInt(m.realAway);
            if (th === rh && ta === ra) return 5;
            if ((th - ta) === (rh - ra)) return 3;
            if ((th > ta && rh > ra) || (th < ta && rh < ra) || (th === ta && rh === ra)) return 2;
            return 0;
        }

        function propagateBracket(pIdx) {
            const matches = state[pIdx].matches;
            for (let i = 16; i < matches.length; i++) { matches[i].t1 = ''; matches[i].t2 = ''; }
            initialMatchesData.filter(d => d.round === 'R32').forEach((m, idx) => { matches[idx].t1 = m.t1; matches[idx].t2 = m.t2; });

            for (let i = 1; i <= 32; i++) {
                const m = matches.find(x => x.id === i);
                let winner = "", loser = "";
                const fallbackT1 = "Sp. " + getMatchOriginId(i, 't1');
                const fallbackT2 = "Sp. " + getMatchOriginId(i, 't2');

                if (m.mode === 'manual') {
                    if (m.manualWinner === 't1' && m.t1) winner = m.t1;
                    else if (m.manualWinner === 't2' && m.t2) winner = m.t2;
                    else winner = m.manualWinner === 't1' ? m.t1 || fallbackT1 : (m.manualWinner === 't2' ? m.t2 || fallbackT2 : "");
                    if (winner) loser = winner === m.t1 ? m.t2 || fallbackT2 : m.t1 || fallbackT1;
                } else {
                    if (m.realHome !== undefined && m.realAway !== undefined && m.realHome !== '' && m.realAway !== '') {
                        const rh = parseInt(m.realHome), ra = parseInt(m.realAway);
                        if (rh > ra) { winner = m.t1 || fallbackT1; loser = m.t2 || fallbackT2; }
                        else if (ra > rh) { winner = m.t2 || fallbackT2; loser = m.t1 || fallbackT1; }
                        else {
                            if (m.penaltyWinner === 't1') { winner = m.t1 || fallbackT1; loser = m.t2 || fallbackT2; }
                            else if (m.penaltyWinner === 't2') { winner = m.t2 || fallbackT2; loser = m.t1 || fallbackT1; }
                        }
                    }
                }

                const targets = getNextMatchTarget(i);
                if (targets && winner) {
                    if (targets.nextId) {
                        matches.find(x => x.id === targets.nextId)[targets.slot] = winner;
                    } else {
                        matches.find(x => x.id === targets.winnerTarget.nextId)[targets.winnerTarget.slot] = winner;
                        if (loser) matches.find(x => x.id === targets.loserTarget.nextId)[targets.loserTarget.slot] = loser;
                    }
                }
            }
        }

        function updateToggleButtonsOnly() {
            const toggleContainer = document.getElementById("player-view-toggle");
            let totalPointsP1 = 0, totalPointsP2 = 0;
            state[0].matches.forEach(m => totalPointsP1 += calculateMatchPoints(m));
            state[1].matches.forEach(m => totalPointsP2 += calculateMatchPoints(m));

            toggleContainer.innerHTML = `
                <button onclick="setActivePlayerView(0)" class="flex-1 py-2.5 text-center font-bold rounded-lg transition-all text-xs sm:text-sm cursor-pointer truncate px-2 ${activePlayerView === 0 ? 'bg-amber-500 text-slate-950 shadow-md' : 'text-slate-600 dark:text-slate-400'}">
                    🏆 ${state[0].name || 'Tipper 1'} (${totalPointsP1} P.)
                </button>
                <button onclick="setActivePlayerView(1)" class="flex-1 py-2.5 text-center font-bold rounded-lg transition-all text-xs sm:text-sm cursor-pointer truncate px-2 ${activePlayerView === 1 ? 'bg-amber-500 text-slate-950 shadow-md' : 'text-slate-600 dark:text-slate-400'}">
                    🏆 ${state[1].name || 'Tipper 2'} (${totalPointsP2} P.)
                </button>
            `;
        }

        function renderApp() {
            updateToggleButtonsOnly();

            state.forEach((player, pIdx) => {
                propagateBracket(pIdx);
                let totalPoints = 0;
                player.matches.forEach(m => { totalPoints += calculateMatchPoints(m); });

                if (pIdx !== activePlayerView) return;

                const container = document.getElementById("player-container-" + pIdx);
                let html = `
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 border-b border-slate-200 dark:border-slate-800 pb-4 mb-4">
                        <div class="w-full sm:w-auto">
                            <label class="block text-[10px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1">Name des Tippers</label>
                            <input type="text" value="${player.name}" oninput="updatePlayerName(${pIdx}, this.value)" 
                                class="bg-slate-100 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-xl px-3 py-2 text-lg font-bold text-slate-900 dark:text-white focus:outline-none focus:border-amber-500 w-full">
                        </div>
                        <div class="bg-emerald-500 dark:bg-emerald-600 px-4 py-2 rounded-xl shadow-sm flex sm:flex-col justify-between items-center sm:justify-center min-w-[100px]">
                            <span class="text-[10px] font-medium text-emerald-100 uppercase">Punkte</span>
                            <span class="text-xl font-black text-white">${totalPoints}</span>
                        </div>
                    </div>
                    
                    <div class="flex gap-1 overflow-x-auto pb-2 mb-4 scrollbar-none snap-x">
                `;

                Object.keys(roundNames).forEach(rKey => {
                    const isActive = player.activeFilter === rKey;
                    html += `<button onclick="setFilter(${pIdx}, '${rKey}')" class="px-3 py-2 rounded-lg text-xs font-bold transition-all whitespace-nowrap cursor-pointer ${isActive ? 'bg-amber-500 text-slate-950 shadow-md' : 'bg-slate-100 dark:bg-slate-950 text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-800'}">${roundNames[rKey]}</button>`;
                });

                html += `</div> <div class="space-y-4">`;

                player.matches.filter(m => player.activeFilter === m.round).forEach(m => {
                    const pts = calculateMatchPoints(m);
                    const t1Name = m.t1 || "Sieger Sp. " + getMatchOriginId(m.id, 't1');
                    const t2Name = m.t2 || "Sieger Sp. " + getMatchOriginId(m.id, 't2');
                    const isDraw = m.realHome !== '' && m.realAway !== '' && parseInt(m.realHome) === parseInt(m.realAway);

                    html += `
                        <div class="bg-slate-50 dark:bg-slate-950 rounded-2xl p-4 border border-slate-200 dark:border-slate-800/80 shadow-sm space-y-4">
                            <div class="flex justify-between items-center text-xs text-slate-400 border-b border-slate-200 dark:border-slate-900 pb-2">
                                <span class="font-bold bg-slate-200 dark:bg-slate-800 px-2 py-0.5 rounded-md text-slate-700 dark:text-slate-300">Match #${m.id}</span>
                                <span class="font-medium">${m.date}</span>
                                ${m.realHome !== '' && m.realAway !== '' ? `<span class="px-2 py-0.5 rounded-md font-bold ${pts === 5 ? 'bg-emerald-500/20 text-emerald-600' : pts === 3 ? 'bg-blue-500/20 text-blue-500' : pts === 2 ? 'bg-yellow-500/20 text-yellow-600' : 'bg-rose-500/20 text-rose-500'}">+${pts} Pkt.</span>` : '<span class="text-slate-400 dark:text-slate-600 italic">Offen</span>'}
                            </div>
                            
                            <div class="space-y-3">
                                <div class="flex items-center gap-3">
                                    <span class="text-2xl">${teamFlags[m.t1] || "🏳️"}</span>
                                    <span class="font-bold text-sm sm:text-base truncate ${m.t1 ? 'text-slate-900 dark:text-slate-200' : 'text-slate-400 italic font-normal'}">${t1Name}</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="text-2xl">${teamFlags[m.t2] || "🏳️"}</span>
                                    <span class="font-bold text-sm sm:text-base truncate ${m.t2 ? 'text-slate-900 dark:text-slate-200' : 'text-slate-400 italic font-normal'}">${t2Name}</span>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-3 pt-1">
                                <div class="bg-slate-200/40 dark:bg-slate-900/60 p-3 rounded-xl border border-slate-300 dark:border-slate-800 text-center flex flex-col items-center justify-center">
                                    <span class="block text-[9px] uppercase font-black tracking-wider text-slate-400 mb-2">Dein Tipp</span>
                                    <div class="flex justify-center items-center gap-2 w-full">
                                        <input type="number" pattern="[0-9]*" inputmode="numeric" min="0" placeholder="-" value="${m.tipHome !== undefined ? m.tipHome : ''}" oninput="updateMatchValue(${pIdx}, ${m.id}, 'tipHome', this.value)" class="w-14 h-12 bg-white dark:bg-slate-950 text-slate-900 dark:text-amber-400 text-center rounded-xl font-black text-xl focus:outline-none border border-slate-300 dark:border-slate-800 focus:border-amber-500 dark:focus:border-amber-500 transition-all">
                                        <span class="text-slate-400 font-bold text-lg">:</span>
                                        <input type="number" pattern="[0-9]*" inputmode="numeric" min="0" placeholder="-" value="${m.tipAway !== undefined ? m.tipAway : ''}" oninput="updateMatchValue(${pIdx}, ${m.id}, 'tipAway', this.value)" class="w-14 h-12 bg-white dark:bg-slate-950 text-slate-900 dark:text-amber-400 text-center rounded-xl font-black text-xl focus:outline-none border border-slate-300 dark:border-slate-800 focus:border-amber-500 dark:focus:border-amber-500 transition-all">
                                    </div>
                                </div>
                                
                                <div class="bg-emerald-500/5 dark:bg-emerald-950/20 p-3 rounded-xl border border-emerald-200 dark:border-emerald-900/30 text-center flex flex-col items-center justify-center">
                                    <span class="block text-[9px] uppercase font-black tracking-wider text-emerald-600 dark:text-emerald-400 mb-2">Real</span>
                                    <div class="flex justify-center items-center gap-2 w-full">
                                        <input type="number" pattern="[0-9]*" inputmode="numeric" min="0" placeholder="-" value="${m.realHome !== undefined ? m.realHome : ''}" oninput="updateMatchValue(${pIdx}, ${m.id}, 'realHome', this.value)" class="w-14 h-12 bg-white dark:bg-slate-950 text-slate-900 dark:text-emerald-400 text-center rounded-xl font-black text-xl focus:outline-none border border-slate-300 dark:border-slate-800 focus:border-emerald-500 dark:focus:border-emerald-500 transition-all">
                                        <span class="text-emerald-500 font-bold text-lg">:</span>
                                        <input type="number" pattern="[0-9]*" inputmode="numeric" min="0" placeholder="-" value="${m.realAway !== undefined ? m.realAway : ''}" oninput="updateMatchValue(${pIdx}, ${m.id}, 'realAway', this.value)" class="w-14 h-12 bg-white dark:bg-slate-950 text-slate-900 dark:text-emerald-400 text-center rounded-xl font-black text-xl focus:outline-none border border-slate-300 dark:border-slate-800 focus:border-emerald-500 dark:focus:border-emerald-500 transition-all">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="pt-2 border-t border-slate-200 dark:border-slate-900 flex items-center justify-between gap-1.5 text-xs">
                                <div class="flex items-center gap-1.5">
                                    <span class="text-[10px] text-slate-400">Modus:</span>
                                    <div class="inline-flex rounded-lg p-0.5 bg-slate-200 dark:bg-slate-950 border border-slate-300 dark:border-slate-800">
                                        <button onclick="updateMatchValue(${pIdx}, ${m.id}, 'mode', 'auto')" class="px-2 py-1 text-[10px] font-bold rounded-md cursor-pointer ${m.mode !== 'manual' ? 'bg-amber-500 text-slate-950 shadow-sm' : 'text-slate-500'}">Auto</button>
                                        <button onclick="updateMatchValue(${pIdx}, ${m.id}, 'mode', 'manual')" class="px-2 py-1 text-[10px] font-bold rounded-md cursor-pointer ${m.mode === 'manual' ? 'bg-amber-500 text-slate-950 shadow-sm' : 'text-slate-500'}">Man.</button>
                                    </div>
                                </div>
                                <div class="text-[11px] max-w-[60%]">
                                    ${m.mode === 'manual' ? `
                                        <div class="flex items-center gap-1"><span class="text-slate-400">Weiter:</span><select onchange="updateMatchValue(${pIdx}, ${m.id}, 'manualWinner', this.value)" class="bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg px-2 py-1 text-[11px] text-slate-900 dark:text-amber-400 font-bold max-w-[110px] truncate focus:outline-none"><option value="">--</option><option value="t1" ${m.manualWinner==='t1'?'selected':''}>${t1Name}</option><option value="t2" ${m.manualWinner==='t2'?'selected':''}>${t2Name}</option></select></div>
                                    ` : `
                                        ${isDraw ? `
                                            <div class="flex items-center gap-1 bg-amber-500/10 border border-amber-500/20 px-2 py-1 rounded-lg"><span class="text-amber-600 dark:text-amber-400 font-black text-[10px]">⚡ i.E.:</span><select onchange="updateMatchValue(${pIdx}, ${m.id}, 'penaltyWinner', this.value)" class="bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg px-1.5 py-0.5 text-[11px] text-slate-900 dark:text-amber-400 font-bold max-w-[90px] truncate focus:outline-none"><option value="">--</option><option value="t1" ${m.penaltyWinner==='t1'?'selected':''}>${t1Name}</option><option value="t2" ${m.penaltyWinner==='t2'?'selected':''}>${t2Name}</option></select></div>
                                        ` : ''}
                                    `}
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
                container.innerHTML = html;
            });
        }

        function getMatchOriginId(currentMatchId, slot) {
            if (currentMatchId >= 17 && currentMatchId <= 24) return (currentMatchId - 17) * 2 + (slot === 't1' ? 1 : 2);
            if (currentMatchId >= 25 && currentMatchId <= 28) return 17 + (currentMatchId - 25) * 2 + (slot === 't1' ? 0 : 1);
            if (currentMatchId >= 29 && currentMatchId <= 30) return 25 + (currentMatchId - 29) * 2 + (slot === 't1' ? 0 : 1);
            return slot === 't1' ? 29 : 30;
        }

        window.updatePlayerName = function(pIdx, val) {
            state[pIdx].name = val;
            saveToLocalStorage();
            // Updatet gezielt nur die Knöpfe und Dashboard-Labels, um den Fokus im Input-Feld nicht zu killen
            updateToggleButtonsOnly();
        };

        window.setFilter = function(pIdx, filterKey) { state[pIdx].activeFilter = filterKey; renderApp(); };
        window.updateMatchValue = function(pIdx, matchId, key, val) {
            const match = state[pIdx].matches.find(m => m.id === matchId);
            if (match) { match[key] = val; saveToLocalStorage(); renderApp(); }
        };

        window.onload = function() {
            loadInitialState();
            renderApp();
        };
    </script>
</body>
</html>
